bio: >
  I'm a nurse, researcher, and educator working across transplant surgery and critical care. My research
  looks at how nursing work is shaped by systems, technologies, and everyday ethics - and how we can
  build working conditions that make good care possible. I use mixed methods (including psychometrics
  and qualitative approaches, and process evaluation) alongside critical posthuman institutional
  ethnography. I work with clinical teams on behaviour change and implementation in real-world settings.
